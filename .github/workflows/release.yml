name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          go build -ldflags="-s -w" -o ars-kit src/main.go
          chmod +x ars-kit

      - name: Create archive
        run: |
          tar -czf ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz ars-kit
          sha256sum ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz > ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz
            ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz.sha256
          body: |
            ## Download
            
            Download the binary for Ubuntu 22.04 (Jammy):
            - `ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz`
            
            ### Installation
            ```bash
            tar -xzf ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz
            sudo mv ars-kit /usr/local/bin/
            ```
            
            ### Verify checksum
            ```bash
            sha256sum -c ars-kit-${{ steps.tag.outputs.TAG }}-linux-amd64.tar.gz.sha256
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
